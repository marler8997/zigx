name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        target:
          - arm-linux-musl
          - x86-linux-musl
          - aarch64-linux-musl
          - x86_64-linux-musl
          - x86_64-macos

    runs-on: ${{matrix.os}}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Build ${{ matrix.target }}
        run: |
          zig build -Dtarget=${{ matrix.target }}
